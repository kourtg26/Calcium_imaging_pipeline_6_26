out_prefix: "Ret_first5s"
out_dir: "."
work_dir: "./_ret_first5s_heatmap_work_v4"
input_zips:
  - "./ret_raw_trace_files 2.zip"

onset_evoked:
  dz_thresh: 0.5
  consec_frames: 10
  post_win_s: 3.0
  dz_reference: "onset_sample"
  pre_win_s: 1.0
  classification_mode: "delta_pos_and_abs_z_run"

groups:
  early_n: 1
  late_n: 1

heatmap:
  tone_only: true
  tone_len_policy: "fixed_seconds"
  fixed_tone_len_seconds: 5.0
  fixed_seconds_exact: true
  delta_from_tone_onset: true
  sort_within_group: "mean_tone_z_desc"
  include_groups_in_heatmap: ["EarlyOnly", "Overlap", "LateOnly"]
  clip_min: -1.0
  clip_max: 1.0

group_order: ["EarlyOnly", "Overlap", "LateOnly"]

colors:
  EarlyOnly: [1.0, 0.0, 0.0]
  Overlap: [0.5, 0.5, 0.5]
  LateOnly: [0.0, 0.0, 1.0]

cell_id:
  pad_numeric_ids_to: 3

cell_whitelist:
  csv_path: "./retrieval_pipeline_outputs_bundle/ret_toneOnly_heatmap_clip-1to1_NO_LABELS_bundle/Ret_toneOnly_heatmap_cell_order.csv"
  animal_col: "animal_id"
  cell_col: "cell_id"
  group_col: "group"
  override_group: true
  use_animal_digit_fallback: true
  include_extra_animals: ["10489"]

plot:
  fig_w: 15
  cells_per_inch: 140
  fig_h_min: 5
  fig_h_max: 18
  tone_separator_lw: 0.6
  tone_separator_alpha: 0.25
  group_separator_lw: 1.0
  group_separator_alpha: 0.35
  dpi: 300
