out_prefix: "Ext2"
out_dir: "/mnt/data"
work_dir: "/mnt/data/_ext2_build_work"
input_zips:
  # replace with your Ext2 raw-trace zip(s)
  - "/mnt/data/ext2_raw_trace_files.zip"

onset_evoked:
  dz_thresh: 0.5
  consec_frames: 10
  post_win_s: 3.0
  dz_reference: "onset_sample"
  pre_win_s: 1.0

groups:
  early_n: 3
  late_n: 3

heatmap:
  tone_only: true
  tone_len_policy: "min_across_all"
  include_groups_in_heatmap: ["EarlyOnly", "Overlap", "LateOnly"]
  clip_min: -1.0
  clip_max:  1.0

group_order: ["EarlyOnly", "Overlap", "LateOnly"]

colors:
  EarlyOnly: [1.0, 0.0, 0.0]
  Overlap:   [0.5, 0.5, 0.5]
  LateOnly:  [0.0, 0.0, 1.0]

plot:
  fig_w: 15
  cells_per_inch: 140
  fig_h_min: 5
  fig_h_max: 18
  dpi: 300
